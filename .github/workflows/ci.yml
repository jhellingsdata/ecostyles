name: CI

# Run the test suite on every pull request and on pushes to main.
# (PRs from a feature branch like `foundations` -> main trigger the pull_request run.)
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv (and the matrix Python)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create venv and install the package with test dependencies
        run: |
          uv venv
          uv pip install -e ".[test]"

      - name: Run tests
        run: uv run --no-sync pytest -q
