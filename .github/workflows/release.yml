name: Release

# Publish to PyPI when a version tag is pushed (e.g. `v0.2.0`).
# Tags are created for you by `bump-my-version` — see RELEASING.md.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # A protected environment lets you require a manual approval before publishing.
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC) — no API token needed
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow creating a GitHub Release for the tag
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        # Creates a Release for the pushed tag with auto-generated notes and the
        # built wheel/sdist attached. This is what makes the tag show in the
        # repo's Releases tab (a git tag alone does not).
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
